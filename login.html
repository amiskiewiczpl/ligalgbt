<!DOCTYPE html>
<html lang="pl" data-page="login">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logowanie administratora | Liga LGBT</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="login-container">
    <section class="login-card">
      <span class="eyebrow">Logowanie</span>
      <h1>Panel administratora</h1>
      <p>Zaloguj się kontem administratora, aby zarządzać drużynami, wynikami i rankingiem MVP.</p>
      <form id="login-form">
        <label>E-mail
          <input type="email" name="email" required placeholder="admin@ligalgbt.pl" autocomplete="username" />
        </label>
        <label>Hasło
          <input type="password" name="password" required placeholder="Hasło administratora" autocomplete="current-password" />
        </label>
        <button type="submit">Zaloguj się</button>
        <p id="login-config-status" class="login-config-status" role="status" hidden></p>
      </form>
      <p class="login-note">Dostęp do panelu jest przeznaczony wyłącznie dla organizatorów ligi.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="data.js"></script>
  <script src="remote-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
